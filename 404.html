<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://kit.fontawesome.com/4ca9851952.js" crossorigin="anonymous"></script>
<title>Konra's Web</title>
<link rel="icon" href="images/icon.png">
<link rel="stylesheet" href="css/404.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nabla&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Londrina+Shadow&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500&display=swap" rel="stylesheet">




</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.135.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.135.0/examples/jsm/controls/OrbitControls.js';
  
    // Creamos la escena, la cámara y el renderizador
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.025); // Agregamos niebla a la escena
  
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);
  
    const canvas = document.createElement('canvas');
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    document.body.appendChild(canvas);
  
    const renderer = new THREE.WebGLRenderer({canvas});
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // Agregamos un fondo negro a la escena
    scene.background = new THREE.Color(0x000000);
  
    // Creamos la geometría de la animación
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      metalness: 0.7,
      roughness: 0.2,
      envMapIntensity: 0.5,
    });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);
  
    // Agregamos luces a la escena
    const light1 = new THREE.PointLight(0xff0000, 1, 100);
    light1.position.set(5, 0, 0);
    scene.add(light1);
  
    const light2 = new THREE.PointLight(0x00ff00, 1, 100);
    light2.position.set(0, 5, 0);
    scene.add(light2);
  
    const light3 = new THREE.PointLight(0x0000ff, 1, 100);
    light3.position.set(0, 0, 5);
    scene.add(light3);
  
    // Movemos la cámara para tener una vista adecuada y agregamos los controles de órbita
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = false;
    controls.minDistance = 1;
    controls.maxDistance = 20;
  
    // Función de animación
    let time = 0;
    const animate = function () {
      requestAnimationFrame(animate);
  
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
  
      // Agregamos una animación de movimiento adicional
      cube.position.x = Math.sin(time) * 2;
      cube.position.y = Math.cos(time) * 2;
  
      time += 0.01;
  
      renderer.render(scene, camera);
    };
  
    // Iniciamos la animación
    animate();
  </script>
  <div id="background-container">
    <h1 id="message">Error<strong>404</strong></h1>
  </div>
</body>
</html>
